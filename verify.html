<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GE · Verify · Geometrie</title>

<style>
body { background:#000; color:#0ff; font-family:Consolas; padding:20px; }
h1 { color:#6cf; }
pre { background:#111; padding:12px; border:1px solid #333; border-radius:6px; }
.geo { color:#0f0; }
.status { color:#6cf; }
</style>

<script>
async function load() {
    const r = await fetch("GE.json");
    return r.ok ? await r.json() : null;
}

function render(data) {
    if (!data) {
        document.getElementById("status").textContent = "FEHLT";
        return;
    }

    document.getElementById("struktur").textContent =
        data.punkt + " / " +
        data.linie + " / " +
        data.flaeche + " / " +
        data.raum;

    document.getElementById("stabil").textContent =
        "1e=" + data["1e"] + ", " +
        "3e=" + data["3e"] + ", " +
        "6e=" + data["6e"] + ", " +
        "9e=" + data["9e"] + ", " +
        "12e=" + data["12e"];

    document.getElementById("status").textContent = "OK · Geometrie geladen";
}

async function start() {
    const data = await load();
    render(data);
}
</script>
</head>

<body onload="start()">

<h1>GE · Verify</h1>

<h2>Struktur</h2>
<pre id="struktur" class="geo">Lade…</pre>

<h2>12e-Stabilität</h2>
<pre id="stabil" class="geo">Lade…</pre>

<h2>Status</h2>
<pre id="status" class="status">Lade…</pre>

</body>
</html>
